services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ../files/config:/app/config
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
      - HOSTNAME=${HOSTNAME}
      - PORT=${PORT}
    dns:
      - ${SAMBA_DC_IP}
      - 1.1.1.1
